<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cek NIK Indonesia PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#eef2f7;padding:20px;}
.box{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:12px;}
input,button{width:100%;padding:12px;margin-top:10px;font-size:16px;}
.result{margin-top:15px;padding:15px;background:#e3f2fd;border-radius:8px;}
</style>
</head>
<body>

<div class="box">
<h2>🇮🇩 Cek NIK Indonesia (PRO)</h2>
<input id="nik" placeholder="Masukkan NIK 16 digit">
<button onclick="cek()">Cek</button>
<div class="result" id="hasil">Hasil tampil di sini</div>
</div>

<script>
let data=[];
fetch('data_full.json').then(r=>r.json()).then(j=>data=j);

function cek(){
 let nik=document.getElementById('nik').value;

 if(nik.length!=16){
   document.getElementById('hasil').innerHTML="NIK harus 16 digit";
   return;
 }

 let kode=nik.substring(0,6);
 let tgl=nik.substring(6,8);
 let bln=nik.substring(8,10);
 let thn=nik.substring(10,12);

 let found=data.find(x=>x.kode===kode);

 let jk = parseInt(tgl) > 40 ? "Perempuan" : "Laki-laki";
 if(parseInt(tgl)>40){ tgl = tgl - 40; }

 if(found){
   document.getElementById('hasil').innerHTML=
   "<b>Wilayah:</b><br>"+
   found.prov+"<br>"+found.kab+"<br>"+found.kec+"<br><br>"+
   "<b>Tanggal Lahir:</b> "+tgl+"-"+bln+"-"+thn+"<br>"+
   "<b>Jenis Kelamin:</b> "+jk;
 }else{
   document.getElementById('hasil').innerHTML="Kode wilayah tidak ditemukan";
 }
}
</script>

</body>
</html>
